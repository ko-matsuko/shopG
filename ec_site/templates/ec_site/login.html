{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>会員ログイン</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
	<body>
        <div class="login_content">
			<h1>ログインしてください。</h1><br>
			<div class="form">
            <form action="{% url 'ec_site:user_login' %}" method='POST'>
                {% csrf_token %}
                <table>
                    {{login_form.as_table}}
                </table>
                <input type="submit" value="ログイン">
			</form>
			</div>
        </div>
        <div class="usercreate">
            <a href="/ec_site/registerUser">会員登録</a><br />
        </div>
	</body>
</html>
