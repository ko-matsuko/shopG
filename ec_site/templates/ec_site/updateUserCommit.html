{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>会員情報の更新完了</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
    <body>
        <h1>以下の会員情報で更新しました</h1>

		<div class="update_user_confirm">
			{% csrf_token %}
			<table border="1">
				<tr>
					<th>会員ID:</th>
					<td>{{user_id}}</td>
				</tr>
				<tr>
					<th>パスワード:</th>
					<td>表示なし</td>
				</tr>
				<tr>
					<th>名前:</th>
					<td>{{name}}</td>
				</tr>
				<tr>
					<th>ご住所:</th>
					<td>{{address}}</td>
				</tr>
			</table>
		</div>
		<br>
		<div class="links">
            <a href="/ec_site/">商品検索</a>へ<br>
        </div>
    </body>
