{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>商品検索</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
	<body>
        <div class="content">
			<h1>商品の検索を行います。</h1><br><br>
            <form action="{% url 'ec_site:search_result'%}" method='POST'>
            {% csrf_token %}
            <tr>
                <th>{{form_category}}</th>
                <th>{{form_keyword}}</th>
            </tr>
            <input type='submit' value='検索' />
            </form>
        </div>
        <br>
        <div class="links">
            <a href="/ec_site/checkCart/">ショッピングカートを見る</a><br><br>
        </div>
        <br><br>
        <div class="nonlogin_only">
            {% if not request.session.is_login %}
                <a href="/ec_site/userLogin/">ログイン</a><br><br>
            {% endif %}
        </div>
        <div class="login_only">
            {% if request.session.is_login %}
                <h3>ようこそ{{request.session.name}}さん</h3><br>
                <a href="/ec_site/registerUser/">ここに会員登録の確認</a><br>
                <a href="/ec_site/registerUser/">ここに会員登録の変更</a><br>
                <a href="/ec_site/userLogout/">ここにログアウト</a><br>
            {% endif %}        
        </div>
	</body>
</html>
