{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>商品検索</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
	<body>
        <div class="content">
			<h1>商品の検索を行います。</h1><br><br>
            <form action="{% url 'ec_site:search_result'%}" method='POST'>
            {% csrf_token %}
            <tr>
                <th>{{form_category}}</th>
                <th>{{form_keyword}}</th>
            </tr>
            <input type='submit' value='検索' />
            </form>

            
        </div>
        <br>
        <div class="links">
            <a href="/ec_site/checkCart/">ショッピングカートを見る</a><br><br>
            <a href="/ec_site/userLogin/">ログイン</a><br><br>
        </div>
	</body>
</html>
