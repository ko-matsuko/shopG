{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>会員登録</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
    <body>
        <h1>会員情報を入力してください。</h1>

        <div class="register_user">
            <form action="{% url 'ec_site:register_user' %}" method="POST">
                {% csrf_token %}
                <table border="1">
                    {% for field in form %}
                    <tr>
                        <th>{{field.label}}</th>
                        <td>{{field}}</td>
                    </tr>
                    {% endfor %}
                </table>
                <input type="submit" value="登録確認">
            </form>
        </div>
    </body>
