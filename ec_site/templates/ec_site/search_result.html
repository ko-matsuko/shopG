{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>商品検索結果</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
    <body>
        <h1>キーワード "{{keyword}}" カテゴリ"{{category}}"の検索結果</h1>

		<div class="content">
			{% csrf_token %}
			<div class="item_list">
				<table border="1">
					<tr>
						<th>商品名</th>
						<th>商品の色</th>
						<th>メーカー名</th>
						<th>価格</th>
					</tr>
					{% for item in item_list %}
					<tr>
						<td>{{item.name}}</td>
						<td>{{item.color}}</td>
						<td>{{item.manufacturer}}</td>
						<td>{{item.price}}</td>
					</tr>
					{% endfor %}
				</table>
			</div>

			<br>
			<div class="link">
				<a href="/ec_site/">商品検索</a>へ<br><br>
			</div>
			
		</div>
    </body>
