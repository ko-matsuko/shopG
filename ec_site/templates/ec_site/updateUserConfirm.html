{% load static %}
<html>
	<head>
		<meta http-equiv='Content-Type' content='text/html; charset=UTF-8' />
		<title>会員情報の更新</title>
		<link rel='stylesheet' type='text/css' href='{% static "ec_site/css/style.css" %}' />
	</head>
    <body>
        <h1>以下の会員情報で更新しますか？</h1>

        <div class="update_user_confirm">
            <form action="{% url 'ec_site:update_user_confirm' %}" method="POST">
                {% csrf_token %}
                <table border="1">
                    <tr>
                        <th>会員ID:</th>
                        <td>{{user_id}}</td>
                    </tr>
                    <tr>
                        <th>パスワード:</th>
                        <td>*****</td>
                    </tr>
                    <tr>
                        <th>名前:</th>
                        <td>{{name}}</td>
                    </tr>
                    <tr>
                        <th>ご住所:</th>
                        <td>{{address}}</td>
                    </tr>
                </table>
                <input type="hidden" name="password" value="{{ password }}">
                <input type="hidden" name="name" value="{{ name }}">
                <input type="hidden" name="address" value="{{ address }}">
                <input type="submit" value="変更">
            </form>
        </div>

        <div class="links">
            <a href="/ec_site/">商品検索</a>へ<br>
        </div>
